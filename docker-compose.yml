services:
  claude:
    image: claude-sandbox
    working_dir: ${PWD}
    stdin_open: true
    tty: true
    volumes:
      - ${PWD}:${PWD}
      # Claude config lives in a named volume — never touches host ~/.claude
      - claude-config:/home/claude/.claude
      # Sessions/history shared with host so conversations can be resumed
      - ${HOME}/.claude/sessions:/home/claude/.claude/sessions
      - ${HOME}/.claude/projects:/home/claude/.claude/projects
      - ${HOME}/.claude/history.jsonl:/home/claude/.claude/history.jsonl
      # Auth & Identity
      - ${HOME}/.npmrc:/home/claude/.npmrc:ro
      - ${HOME}/.gitconfig:/home/claude/.gitconfig:ro
      - ${HOME}/.ssh:/home/claude/.ssh:ro
      # Kubernetes
      - ${HOME}/.kube:/home/claude/.kube:ro
      - ${HOME}/.pmctl:/home/claude/.pmctl:ro
      - ${HOME}/.config/argocd:/home/claude/.config/argocd:ro
      # Databases
      - ${HOME}/.docdb:/home/claude/.docdb:ro
      - ${HOME}/.aws:/home/claude/.aws:ro
      # Editor
      - ${HOME}/.vimrc:/home/claude/.vimrc:ro
      - ${HOME}/.vim:/home/claude/.vim:ro
      # Files
      - ${HOME}/Downloads:/home/claude/Downloads:ro

volumes:
  claude-config:
